title: Arjun Saha
description: Arjun Saha is an Applied AI/ML Engineer building practical, production-oriented systems across healthcare, finance, agriculture, and trust & safety. His work bridges research and working prototypes, with a focus on Retrieval-Augmented Generation (RAG), NLP for low-resource languages (Bangla), graph-based fraud detection, and causal machine learning.
